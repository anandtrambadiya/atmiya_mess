{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Pricing & Timing Settings</h1>

    <form method="POST" class="space-y-5">

        <!-- Pricing -->
        <div class="bg-[#16213e] rounded-2xl p-6">
            <h2 class="font-semibold mb-4 text-white/60 text-sm uppercase tracking-wider">Pass Pricing</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm text-white/50 mb-1 block">Student (Lunch or Dinner)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-white/40">₹</span>
                        <input name="student_price" type="number" value="{{ s.student_price }}"
                            class="w-full bg-[#0f3460] border border-white/10 rounded-xl pl-8 pr-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block">Faculty (Lunch or Dinner)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-white/40">₹</span>
                        <input name="faculty_price" type="number" value="{{ s.faculty_price }}"
                            class="w-full bg-[#0f3460] border border-white/10 rounded-xl pl-8 pr-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block">Student (Both)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-white/40">₹</span>
                        <input name="student_both" type="number" value="{{ s.student_both }}"
                            class="w-full bg-[#0f3460] border border-white/10 rounded-xl pl-8 pr-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-white/50 mb-1 block">Faculty (Both)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-white/40">₹</span>
                        <input name="faculty_both" type="number" value="{{ s.faculty_both }}"
                            class="w-full bg-[#0f3460] border border-white/10 rounded-xl pl-8 pr-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                    </div>
                </div>
                <div class="col-span-2">
                    <label class="text-sm text-white/50 mb-1 block">One Time Price</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-white/40">₹</span>
                        <input name="one_time_price" type="number" value="{{ s.one_time_price }}"
                            class="w-full bg-[#0f3460] border border-white/10 rounded-xl pl-8 pr-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                    </div>
                </div>
            </div>
        </div>

        <!-- Timing -->
        <div class="bg-[#16213e] rounded-2xl p-6">
            <h2 class="font-semibold mb-4 text-white/60 text-sm uppercase tracking-wider">Meal Timing</h2>
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <h3 class="text-sm font-medium mb-3 text-amber-400">🌞 Lunch</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs text-white/40 mb-1 block">Start Time</label>
                            <input name="lunch_start" type="time" value="{{ s.lunch_start }}"
                                class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                        </div>
                        <div>
                            <label class="text-xs text-white/40 mb-1 block">End Time</label>
                            <input name="lunch_end" type="time" value="{{ s.lunch_end }}"
                                class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                        </div>
                    </div>
                </div>
                <div>
                    <h3 class="text-sm font-medium mb-3 text-blue-400">🌙 Dinner</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="text-xs text-white/40 mb-1 block">Start Time</label>
                            <input name="dinner_start" type="time" value="{{ s.dinner_start }}"
                                class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                        </div>
                        <div>
                            <label class="text-xs text-white/40 mb-1 block">End Time</label>
                            <input name="dinner_end" type="time" value="{{ s.dinner_end }}"
                                class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full bg-[#e94560] hover:bg-[#c73652] py-3 rounded-xl font-semibold">
            Save Settings
        </button>
    </form>
</div>
{% endblock %}
