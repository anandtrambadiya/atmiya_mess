{% extends "base.html" %}
{% block title %}Edit User{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-6">Edit User #{{ user.id }}</h1>
    <form method="POST" class="bg-[#16213e] rounded-2xl p-6 space-y-4">
        <div>
            <label class="text-sm text-white/60 mb-1 block">Name</label>
            <input name="name" value="{{ user.name }}" required class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-sm text-white/60 mb-1 block">Branch</label>
                <input name="branch" value="{{ user.branch or '' }}" class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
            </div>
            <div>
                <label class="text-sm text-white/60 mb-1 block">Semester</label>
                <input name="sem" value="{{ user.sem or '' }}" class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
            </div>
        </div>
        <div>
            <label class="text-sm text-white/60 mb-1 block">Institute</label>
            <input name="institute" value="{{ user.institute or '' }}" class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
        </div>
        <div>
            <label class="text-sm text-white/60 mb-1 block">Mobile</label>
            <input name="mobile" value="{{ user.mobile }}" required class="w-full bg-[#0f3460] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#e94560]">
        </div>
        <button type="submit" class="w-full bg-[#e94560] hover:bg-[#c73652] py-3 rounded-xl font-semibold">Update</button>
    </form>
</div>
{% endblock %}
