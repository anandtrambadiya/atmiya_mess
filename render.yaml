services:
  - type: web
    name: atmiya-mess
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: atmiya-mess-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: atmiya-mess-db
    databaseName: atmiya_mess
    plan: free